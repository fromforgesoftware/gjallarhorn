{{- if not .Values.database.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "gjallarhorn.dbSecretName" . }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
  labels:
    {{- include "gjallarhorn.labels" . | nindent 4 }}
type: Opaque
stringData:
  DB_USER: {{ .Values.database.username | quote }}
  DB_PASSWORD: {{ .Values.database.password | quote }}
{{- end }}
{{- if not .Values.channels.existingSecret }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "gjallarhorn.channelSecretName" . }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
  labels:
    {{- include "gjallarhorn.labels" . | nindent 4 }}
type: Opaque
stringData:
  SMTP_PASSWORD: {{ .Values.channels.emailSecret.password | quote }}
  WEBHOOK_SIGNING_SECRET: {{ .Values.channels.webhookSecret.signingSecret | quote }}
  SMS_AUTH_HEADER: {{ .Values.channels.smsSecret.authHeader | quote }}
  PUSH_AUTH_HEADER: {{ .Values.channels.pushSecret.authHeader | quote }}
{{- end }}
